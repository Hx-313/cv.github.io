<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV – Hafiz Ali Abdullah</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#0b5ed7;--blue-light:#3b82f6;--blue-dark:#1d4ed8;
  --black:#111;--dark:#222;--muted:#555;--light-muted:#888;
  --border:#ccc;--bg:#eae8e3;--panel-bg:#fff;
  --font:'Source Sans 3',sans-serif;--radius:5px;
}
body{font-family:var(--font);background:var(--bg);color:var(--black);font-size:14px;}

/* TOOLBAR */
#toolbar{
  position:sticky;top:0;z-index:200;background:#1a1a1a;
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 22px;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.35);
}
#toolbar .tl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#toolbar h2{color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.6px;white-space:nowrap;}
.badge{background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.4px;}
.tbtn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:var(--radius);
  font-family:var(--font);font-size:12px;font-weight:700;
  letter-spacing:.3px;cursor:pointer;border:2px solid transparent;
  transition:all .16s;white-space:nowrap;
}
.tbtn-bold{background:#fff;color:#1a1a1a;border-color:#fff;}
.tbtn-bold:hover{background:#e8e4de;}
.tbtn-bold.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.tbtn-print{background:var(--blue);color:#fff;border-color:var(--blue);}
.tbtn-print:hover{background:var(--blue-dark);border-color:var(--blue-dark);}
.tbtn-reset{background:#444;color:#fff;border-color:#444;}
.tbtn-reset:hover{background:#555;border-color:#555;}

/* LAYOUT */
#app{display:flex;height:calc(100vh - 50px);}
#form-panel{
  width:360px;min-width:300px;flex-shrink:0;
  background:var(--panel-bg);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 14px 60px;
}
#form-panel::-webkit-scrollbar{width:4px;}
#form-panel::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
#preview-panel{
  flex:1;min-width:0;overflow-y:auto;background:#dddad4;
  display:flex;justify-content:center;padding:28px 16px 60px;
}
#preview-panel::-webkit-scrollbar{width:6px;}
#preview-panel::-webkit-scrollbar-thumb{background:#bbb;border-radius:4px;}

/* FORM STYLES */
.fs{margin-bottom:18px;}
.fs-title{
  font-size:9.5px;font-weight:700;letter-spacing:1.6px;
  text-transform:uppercase;color:var(--light-muted);
  margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #e0ddd8;
}
.fg{margin-bottom:8px;}
.fg label{display:block;font-size:10px;font-weight:600;color:#555;margin-bottom:2px;letter-spacing:.2px;}
.fg input,.fg textarea{
  width:100%;padding:6px 9px;border:1px solid #d5d0ca;border-radius:var(--radius);
  font-family:var(--font);font-size:11.5px;color:var(--dark);
  background:#fafafa;resize:vertical;line-height:1.45;
  transition:border-color .15s,box-shadow .15s;
}
.fg input:focus,.fg textarea:focus{
  outline:none;border-color:var(--blue-light);
  box-shadow:0 0 0 2px rgba(59,130,246,.12);background:#fff;
}
.fg textarea{min-height:50px;}
.fg textarea.tall{min-height:76px;}
.hint{font-size:9px;color:#aaa;margin-top:2px;font-style:italic;}

/* LINK ROW — label + url side by side */
.link-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px;background:#f5f2ee;border:1px solid #e0dcd6;border-radius:var(--radius);padding:8px 10px;}
.link-row .lr-fields{flex:1;display:flex;flex-direction:column;gap:5px;}
.link-row .lr-input{
  width:100%;padding:5px 8px;border:1px solid #d5d0ca;border-radius:4px;
  font-family:var(--font);font-size:11px;color:var(--dark);background:#fff;
}
.link-row .lr-input:focus{outline:none;border-color:var(--blue-light);}
.link-row .lr-label-row{display:flex;gap:5px;}
.link-row .lr-small{font-size:9px;color:#888;margin-bottom:2px;font-weight:600;}
.link-rm{
  background:transparent;border:none;color:#c0392b;
  font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;
  align-self:center;flex-shrink:0;
}

/* COLLAPSIBLE */
.blk{background:#fafafa;border:1px solid #e0dcd6;border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.blk-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;cursor:pointer;user-select:none;
  background:#f3f0eb;transition:background .15s;
}
.blk-hd:hover{background:#ebe7e0;}
.blk-lbl{font-size:11px;font-weight:700;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px;}
.blk-arr{font-size:11px;color:#999;transition:transform .2s;flex-shrink:0;}
.blk-arr.open{transform:rotate(90deg);}
.blk-body{padding:10px 11px;display:none;}
.blk-body.open{display:block;}
.btn-add{
  display:inline-flex;align-items:center;gap:4px;
  background:transparent;border:1px dashed #b0aba4;
  color:#777;font-size:10.5px;font-weight:600;
  padding:5px 12px;border-radius:var(--radius);
  cursor:pointer;margin-top:4px;transition:all .15s;font-family:var(--font);
}
.btn-add:hover{border-color:var(--blue);color:var(--blue);background:#f0f5fa;}
.btn-rm{
  background:transparent;border:none;color:#c0392b;
  font-size:11px;cursor:pointer;padding:2px 5px;font-weight:700;
  font-family:var(--font);margin-top:6px;display:inline-block;
}
.btn-rm:hover{text-decoration:underline;}

/* ═══════════════════════════════════════
   CV PREVIEW — A4 PAGE SYSTEM
═══════════════════════════════════════ */
#cv {
  width: 210mm;
  font-family: var(--font);
  font-size: 9.4pt;
  color: #111;
  line-height: 1.45;
  margin: 0 auto;
}

.cv-page {
  width: 210mm;
  min-height: 297mm;
  height: 297mm;
  padding: 15mm 15mm 20mm 15mm;
  background: #fff;
  box-shadow: 0 4px 30px rgba(0,0,0,.15);
  margin-bottom: 24px;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

.cv-page-footer {
  position: absolute;
  bottom: 8mm;
  left: 15mm;
  right: 15mm;
  font-size: 8pt;
  color: #888;
  font-weight: 500;
  font-family: var(--font);
  pointer-events: none;
}
.cv-footer-line {
  border-top: 1px solid #e0dcd6;
  margin-bottom: 5px;
}
.cv-footer-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Sibling item borders (via CSS adjacency) */
.cv-job + .cv-job { border-top: 1px dotted #ccc; padding-top: 10px; }
.cv-edu + .cv-edu { border-top: 1px dotted #ccc; padding-top: 10px; }
.cv-cert + .cv-cert { border-top: 1px dotted #ccc; padding-top: 8px; }

/* Hidden sandbox for measuring block heights */
#cv-sandbox {
  position: absolute;
  left: -9999px;
  top: -9999px;
  width: 210mm;
  padding: 15mm 15mm 20mm 15mm;
  box-sizing: border-box;
  font-family: var(--font);
  font-size: 9.4pt;
  color: #111;
  line-height: 1.45;
  visibility: hidden;
  background: white;
}

#cv .cv-hd{padding-bottom:10px;border-bottom:2.5px solid var(--blue);margin-bottom:12px;}
#cv .cv-name{font-size:22pt;font-weight:900;letter-spacing:1.8px;text-transform:uppercase;color:#000;line-height:1.05;}
#cv .cv-role{font-size:8.8pt;font-weight:600;letter-spacing:.9px;color:var(--blue);margin-top:3px;text-transform:uppercase;}
#cv .cv-contacts{margin-top:6px;font-size:8.2pt;color:#333;display:flex;flex-wrap:wrap;gap:4px 16px;align-items:center;}
#cv .cv-contacts .ci{color:#333;display:inline-flex;align-items:center;font-weight:600;}
#cv .cv-contacts .ci,
#cv .cv-contacts a.ci-link{
  max-width:100%;overflow-wrap:anywhere;word-break:break-word;
}
#cv a.ci-link{
  color:#333;text-decoration:underline;font-weight:600;font-size:8.2pt;
  display:inline-flex;align-items:center;transition:color .15s;
}
#cv a.ci-link:hover{color:var(--blue);}
.cv-icon{
  width:11px;height:11px;color:var(--blue);display:inline-block;
  vertical-align:middle;margin-right:4px;flex-shrink:0;
}

#cv .sec{margin-bottom:11px;}
#cv .sec-ttl{
  font-size:9pt;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:#111;border-bottom:1.8px solid #111;padding-bottom:2px;margin-bottom:8px;
}
#cv .cv-sum{font-size:8.8pt;color:#222;line-height:1.55;text-align:justify;}
#cv .cv-job{margin-bottom:10px;}
#cv .cv-jt{font-size:9.4pt;font-weight:700;color:#111;line-height:1.2;}
#cv .cv-jc{font-size:8.8pt;font-weight:700;color:var(--blue);margin-top:2px;line-height:1.2;}
#cv .cv-jmeta {
  font-size: 8pt;
  color: #555;
  margin-top: 3px;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  font-weight: 500;
}
#cv .cv-jmeta .cv-meta-item {
  display: inline-flex;
  align-items: center;
}
#cv .cv-jcd{font-size:8.2pt;color:#666;font-style:italic;margin-top:1px;margin-bottom:3px;}
#cv .cv-job ul{padding-left:15px;margin-top:4px;}
#cv .cv-job li{font-size:8.6pt;color:#222;margin-bottom:2px;line-height:1.42;}
#cv .cv-edu{display:flex;justify-content:space-between;align-items:stretch;margin-bottom:8px;}
#cv .cv-edu-deg{font-size:9.4pt;font-weight:700;color:#111;line-height:1.2;}
#cv .cv-edu-inst{font-size:8.8pt;font-weight:700;color:var(--blue);margin-top:2px;line-height:1.2;}
#cv .cv-edu-r{
  border-left:1.5px solid #dcdadb;
  padding-left:12px;
  text-align:left;
  min-width:100px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex-shrink:0;
  margin-left:16px;
}
#cv .cv-edu-gpa-label{font-size:7pt;color:#777;text-transform:uppercase;font-weight:700;letter-spacing:.5px;line-height:1.1;}
#cv .cv-edu-gpa-val{font-size:9.5pt;font-weight:700;color:var(--blue);margin-top:2px;line-height:1.1;}
#cv .cv-proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
#cv .cv-proj-item{margin-bottom:2px;}
#cv .cv-proj-name{font-size:9pt;font-weight:700;color:#111;line-height:1.25;}
#cv .cv-proj-desc{font-size:8.2pt;color:#444;line-height:1.42;margin-top:2px;}
.proj-icon{width:13px;height:13px;color:var(--blue);margin-top:2px;flex-shrink:0;}
#cv .cv-skills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
#cv .cv-skill{
  background:#fff;color:#222;border:1px solid #d1d5db;border-bottom:2px solid #a3a9b3;
  font-size:7.8pt;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;line-height:1.5;
}
#cv .cv-cert{margin-bottom:6px;}
#cv .cv-cert-name{font-size:9pt;font-weight:700;color:#111;}
#cv .cv-cert-iss{font-size:8pt;color:var(--blue);font-weight:700;}
#cv .cv-refs{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
#cv .cv-ref-name{font-size:9.4pt;font-weight:700;color:#111;}
#cv .cv-ref-role{font-size:8.2pt;color:var(--blue);font-weight:700;line-height:1.35;white-space:pre-line;}
#cv .cv-ref-c{font-size:8.2pt;color:#444;margin-top:2px;}
#cv .cv-ref-c a{color:#444;text-decoration:underline;overflow-wrap:anywhere;word-break:break-word;}

@media screen and (max-width:900px){
  #toolbar{position:static;align-items:flex-start;flex-direction:column;padding:10px 14px;}
  #toolbar .tl{width:100%;}
  #toolbar>div:last-child{width:100%;flex-wrap:wrap;}
  #app{height:auto;min-height:calc(100vh - 50px);flex-direction:column;}
  #form-panel{width:100%;min-width:0;border-right:0;border-bottom:1px solid var(--border);max-height:none;}
  #preview-panel{padding:18px 10px 44px;overflow:visible;}
}

@media screen and (max-width:520px){
  #toolbar h2{width:100%;}
  .tbtn{width:100%;justify-content:center;}
  .link-row .lr-label-row{flex-direction:column;}
}

@media print{
  @page{size:A4;margin:0;}
  html,body{width:210mm;height:auto;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}
  #toolbar,#form-panel,#cv-sandbox{display:none!important;}
  #app,#preview-panel{
    display:block!important;width:210mm!important;height:auto!important;overflow:visible!important;
    margin:0!important;padding:0!important;background:#fff!important;
  }
  #cv-scale-outer,#cv-scale-wrapper{
    width:210mm!important;height:auto!important;transform:none!important;
    margin:0!important;padding:0!important;
  }
  #cv{
    display:block!important;width:210mm!important;height:auto!important;
    margin:0!important;padding:0!important;box-shadow:none!important;background:#fff!important;
    transform:none!important;
  }
  .cv-page{
    width:210mm!important;height:297mm!important;
    padding:15mm 15mm 20mm 15mm!important;
    margin:0!important;box-shadow:none!important;
    page-break-after:always!important;
    page-break-inside:avoid!important;
    position:relative!important;background:#fff!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .cv-page:last-child{page-break-after:avoid!important;}
  .cv-page-footer{
    position:absolute!important;bottom:8mm!important;left:15mm!important;right:15mm!important;
    display:block!important;
  }
}
</style>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="tl">
    <h2>✦ CV EDITOR</h2>
    <span class="badge">LIVE</span>
    <button class="tbtn tbtn-bold" id="boldBtn" onclick="applyBold()">
      <b style="font-size:14px;line-height:1">B</b>&nbsp;Bold Selected Text
    </button>
    <span style="color:#555;font-size:10px;">← select text in any field first</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="tbtn tbtn-reset" onclick="resetTemplate()">🔄&nbsp; Reset to Default</button>
    <button class="tbtn tbtn-print" onclick="printCV()">🖨&nbsp; Print / Save PDF</button>
  </div>
</div>

<div id="app">
  <!-- FORM PANEL -->
  <div id="form-panel">

    <div class="fs">
      <div class="fs-title">Header</div>
      <div class="fg"><label>Full Name</label><input id="f-name" oninput="render()"></div>
      <div class="fg"><label>Job Title / Role</label><input id="f-title" oninput="render()"></div>
      <div class="fg"><label>Phone</label><input id="f-phone" oninput="render()"></div>
      <div class="fg"><label>Email</label><input id="f-email" oninput="render()"></div>
      <div class="fg"><label>Location</label><input id="f-location" oninput="render()"></div>
    </div>

    <div class="fs">
      <div class="fs-title">Links <span style="font-weight:400;text-transform:none;font-size:9px;letter-spacing:0">(clickable in CV)</span></div>
      <div id="links-wrap"></div>
      <button class="btn-add" onclick="addLink()">+ Add Link</button>
    </div>

    <div class="fs">
      <div class="fs-title">Summary</div>
      <div class="fg">
        <textarea id="f-summary" class="tall" oninput="render()"></textarea>
        <div class="hint">💡 Select text → Bold button to bold any word</div>
      </div>
    </div>

    <div class="fs">
      <div class="fs-title">Experience</div>
      <div id="jobs-wrap"></div>
      <button class="btn-add" onclick="addJob()">+ Add Job</button>
    </div>

    <div class="fs">
      <div class="fs-title">Education</div>
      <div id="edu-wrap"></div>
      <button class="btn-add" onclick="addEdu()">+ Add Education</button>
    </div>

    <div class="fs">
      <div class="fs-title">Side Projects</div>
      <div id="proj-wrap"></div>
      <button class="btn-add" onclick="addProj()">+ Add Project</button>
    </div>

    <div class="fs">
      <div class="fs-title">Skills <span style="font-weight:400;text-transform:none;font-size:9px;letter-spacing:0">(one per line)</span></div>
      <div class="fg">
        <textarea id="f-skills" style="min-height:130px" oninput="render()"></textarea>
        <div class="hint">Each line = one blue tag badge</div>
      </div>
    </div>

    <div class="fs">
      <div class="fs-title">Certifications</div>
      <div id="cert-wrap"></div>
      <button class="btn-add" onclick="addCert()">+ Add Certification</button>
    </div>

    <div class="fs">
      <div class="fs-title">References</div>
      <div id="refs-wrap"></div>
      <button class="btn-add" onclick="addRef()">+ Add Reference</button>
    </div>

  </div>

  <!-- PREVIEW PANEL -->
  <div id="preview-panel">
    <div id="cv-scale-outer">
      <div id="cv-scale-wrapper">
        <div id="cv"></div>
      </div>
    </div>
  </div>
</div>

<div id="cv-sandbox"></div>

function renderGpaBox(gpaStr) {
  if (!gpaStr) return '';
  const idx = gpaStr.indexOf(':');
  let label = 'Result';
  let val = gpaStr;
  if (idx !== -1) {
    label = gpaStr.substring(0, idx).trim();
    val = gpaStr.substring(idx + 1).trim();
  } else {
    const spaceIdx = gpaStr.search(/\s\d/);
    if (spaceIdx !== -1) {
      label = gpaStr.substring(0, spaceIdx).trim();
      val = gpaStr.substring(spaceIdx).trim();
    }
  }
  return `<div class="cv-edu-gpa-label">${esc(label)}</div>` +
         `<div class="cv-edu-gpa-val">${bf(val)}</div>`;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function bf(s){
  if(!s) return '';
  return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}
function nl2br(s){ return bf(s).replace(/\n/g,'<br>'); }
function linkHref(url){
  url = (url || '').trim();
  if(!url) return '';
  if(/^(https?:|mailto:|tel:)/i.test(url)) return url;
  if(/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(url)) return 'mailto:' + url;
  if(/^\+?[\d\s().-]{7,}$/.test(url)) return 'tel:' + url.replace(/\s+/g, '');
  return 'https://' + url.replace(/^\/+/, '');
}
function contactAnchor(value, icon){
  if(!value) return '';
  return '<a class="ci-link" href="'+esc(linkHref(value))+'">'+icon+bf(value)+'</a>';
}
function tog(hd){
  hd.nextElementSibling.classList.toggle('open');
  hd.querySelector('.blk-arr').classList.toggle('open');
}

/* ══════════════════════════════════════════
   BOLD — tracks focus & selection correctly
══════════════════════════════════════════ */
let _el = null, _s0 = 0, _s1 = 0;
document.addEventListener('focusin', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') _el = e.target;
});
document.addEventListener('selectionchange', () => {
  if(_el){ _s0 = _el.selectionStart; _s1 = _el.selectionEnd; }
});
['mouseup','keyup','keydown'].forEach(ev =>
  document.addEventListener(ev, () => { if(_el){ _s0=_el.selectionStart; _s1=_el.selectionEnd; } })
);

function applyBold(){
  if(!_el){ alert('Click inside any text field first, select some text, then click Bold.'); return; }
  let s = _el.selectionStart, e = _el.selectionEnd;
  if(s===e){ s=_s0; e=_s1; }
  if(s===e){ alert('Please select some text first, then click Bold.'); return; }
  const v=_el.value, sel=v.slice(s,e), before=v.slice(0,s), after=v.slice(e);
  let nv, nc;
  if(before.endsWith('**')&&after.startsWith('**')){
    nv = v.slice(0,s-2)+sel+v.slice(e+2); nc = s-2+sel.length;
  } else {
    nv = before+'**'+sel+'**'+after; nc = s+2+sel.length+2;
  }
  _el.value = nv;
  _el.focus();
  _el.setSelectionRange(nc,nc);
  _el.dispatchEvent(new Event('input'));
  const btn=document.getElementById('boldBtn');
  btn.classList.add('active');
  setTimeout(()=>btn.classList.remove('active'),600);
}

/* ══════════════════════════════════════════
   PAGINATION & SCALING UTILITIES
══════════════════════════════════════════ */
let maxContentHeightPx = 0;

function updateMaxContentHeight() {
  // 297mm page - 15mm top padding - 20mm bottom padding - ~12mm footer = ~250mm safe area
  const testPage = document.createElement('div');
  testPage.className = 'cv-page';
  testPage.style.position = 'absolute';
  testPage.style.visibility = 'hidden';
  testPage.style.left = '-9999px';
  testPage.style.top = '-9999px';

  const measureChild = document.createElement('div');
  measureChild.style.height = '250mm';
  testPage.appendChild(measureChild);

  document.body.appendChild(testPage);
  maxContentHeightPx = measureChild.getBoundingClientRect().height;
  document.body.removeChild(testPage);
}

function assembleBlocksHtml(blocksArray) {
  let html = '';
  let currentSection = null;
  let sectionBlocks = [];

  function flushSection() {
    if (sectionBlocks.length === 0) return;
    if (currentSection === 'header') {
      html += sectionBlocks.map(b => b.html).join('');
    } else {
      html += '<div class="sec">' + sectionBlocks.map(b => b.html).join('') + '</div>';
    }
    sectionBlocks = [];
  }

  blocksArray.forEach(block => {
    const secName = block.section || 'header';
    if (secName !== currentSection) {
      flushSection();
      currentSection = secName;
    }
    sectionBlocks.push(block);
  });
  flushSection();

  return html;
}

function measureBlocksHeight(blocksArray) {
  const sandbox = document.getElementById('cv-sandbox');
  sandbox.innerHTML = assembleBlocksHtml(blocksArray);
  const h = sandbox.getBoundingClientRect().height;
  return h;
}

function adjustScale() {
  const panel = document.getElementById('preview-panel');
  const wrapper = document.getElementById('cv-scale-wrapper');
  const outer = document.getElementById('cv-scale-outer');
  if (!panel || !wrapper || !outer) return;

  const containerWidth = panel.clientWidth - 56; // padding
  const pageWidthPx = 794; // ~210mm at 96dpi

  if (containerWidth < pageWidthPx) {
    const scale = containerWidth / pageWidthPx;
    wrapper.style.transform = 'scale(' + scale + ')';
    wrapper.style.transformOrigin = 'top center';
    // Set outer height so scroll works properly
    outer.style.height = (wrapper.scrollHeight * scale) + 'px';
    outer.style.width = containerWidth + 'px';
  } else {
    wrapper.style.transform = 'none';
    outer.style.height = 'auto';
    outer.style.width = '210mm';
  }
}

window.addEventListener('resize', adjustScale);

  const loc     = document.getElementById('f-location').value;
  const summary = document.getElementById('f-summary').value;
  const skills  = document.getElementById('f-skills').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);

  updateMaxContentHeight();

  /* ── Build logical blocks ── */
  const blocks = [];

  // HEADER
  var validLinks = D.links.filter(function(lk){ return lk.label && lk.url; });
  let hh = '<div class="cv-hd">';
  hh += '<div class="cv-name">'+bf(name)+'</div>';
  hh += '<div class="cv-role">'+bf(title)+'</div>';
  hh += '<div class="cv-contacts">';
  if(phone) hh += contactAnchor(phone, phoneIcon);
  if(email) hh += contactAnchor(email, emailIcon);
  validLinks.forEach(function(lk){
    hh += '<a class="ci-link" href="'+esc(linkHref(lk.url))+'" target="_blank" rel="noopener">'+linkIcon+esc(lk.label)+'</a>';
  });
  if(loc) hh += '<span class="ci">'+mapPinIcon+bf(loc)+'</span>';
  hh += '</div></div>';
  blocks.push({ type:'header', section:'header', html:hh });

  // SUMMARY
  if(summary){
    blocks.push({ type:'summary', section:'summary',
      html:'<div class="sec-ttl">Summary</div><div class="cv-sum">'+bf(summary)+'</div>'
    });
  }

  // EXPERIENCE
  if(D.jobs.length){
    blocks.push({ type:'section-title', section:'jobs', html:'<div class="sec-ttl">Experience</div>' });
    D.jobs.forEach(function(j, idx){
      var buls = j.bullets.filter(function(b){ return (b||'').trim(); });
      let jh = '<div class="cv-job">';
      jh += '<div class="cv-jt">'+bf(j.title)+'</div>';
      jh += '<div class="cv-jc">'+bf(j.company)+'</div>';
      jh += '<div class="cv-jmeta">' + renderDateLoc(j.date) + '</div>';
      if(j.desc) jh += '<div class="cv-jcd">'+bf(j.desc)+'</div>';
      if(buls.length){ jh += '<ul>'+buls.map(function(b){ return '<li>'+bf(b)+'</li>'; }).join('')+'</ul>'; }
      jh += '</div>';
      blocks.push({ type:'item', section:'jobs', itemIndex:idx, html:jh });
    });
  }

  // EDUCATION
  if(D.edu.length){
    blocks.push({ type:'section-title', section:'edu', html:'<div class="sec-ttl">Education</div>' });
    D.edu.forEach(function(e, idx){
      let eh = '<div class="cv-edu"><div>';
      eh += '<div class="cv-edu-deg">'+bf(e.degree)+'</div>';
      eh += '<div class="cv-edu-inst">'+bf(e.inst)+'</div>';
      eh += '<div class="cv-jmeta">' + renderDateLoc(e.date) + '</div>';
      eh += '</div><div class="cv-edu-r">';
      eh += renderGpaBox(e.gpa);
      eh += '</div></div>';
      blocks.push({ type:'item', section:'edu', itemIndex:idx, html:eh });
    });
  }

  // PROJECTS (paired into 2-col grid rows)
  if(D.projects.length){
    blocks.push({ type:'section-title', section:'projects', html:'<div class="sec-ttl">Side Projects</div>' });
    for(let i = 0; i < D.projects.length; i += 2) {
      const p1 = D.projects[i];
      const p2 = D.projects[i+1];
      let ph = '<div class="cv-proj-grid">';
      ph += '<div class="cv-proj-item"><div style="display:flex;gap:8px;align-items:flex-start;">';
      ph += getProjectIcon(p1.name);
      ph += '<div><div class="cv-proj-name">'+bf(p1.name)+'</div>';
      ph += '<div class="cv-proj-desc">'+bf(p1.desc)+'</div></div></div></div>';
      if(p2) {
        ph += '<div class="cv-proj-item"><div style="display:flex;gap:8px;align-items:flex-start;">';
        ph += getProjectIcon(p2.name);
        ph += '<div><div class="cv-proj-name">'+bf(p2.name)+'</div>';
        ph += '<div class="cv-proj-desc">'+bf(p2.desc)+'</div></div></div></div>';
      }
      ph += '</div>';
      blocks.push({ type:'item', section:'projects', itemIndex:i, html:ph });
    }
  }

  // SKILLS
  if(skills.length){
    blocks.push({ type:'section-title', section:'skills', html:'<div class="sec-ttl">Skills</div>' });
    let sh = '<div class="cv-skills">';
    skills.forEach(function(s){ sh += '<span class="cv-skill">'+bf(s)+'</span>'; });
    sh += '</div>';
    blocks.push({ type:'item', section:'skills', html:sh });
  }

  // CERTIFICATIONS
  if(D.certs.length){
    blocks.push({ type:'section-title', section:'certs', html:'<div class="sec-ttl">Certifications</div>' });
    D.certs.forEach(function(c, idx){
      let ch = '<div class="cv-cert">';
      ch += '<div class="cv-cert-name">'+bf(c.name)+'</div>';
      ch += '<div class="cv-cert-iss">'+bf(c.iss)+'</div>';
      ch += '</div>';
      blocks.push({ type:'item', section:'certs', itemIndex:idx, html:ch });
    });
  }

  // REFERENCES (paired into 2-col grid rows)
  if(D.refs.length){
    blocks.push({ type:'section-title', section:'refs', html:'<div class="sec-ttl">References</div>' });
    for(let i = 0; i < D.refs.length; i += 2) {
      const r1 = D.refs[i];
      const r2 = D.refs[i+1];
      let rh = '<div class="cv-refs"><div>';
      rh += '<div class="cv-ref-name">'+bf(r1.name)+'</div>';
      rh += '<div class="cv-ref-role">'+nl2br(r1.role)+'</div>';
      if(r1.email) rh += '<div class="cv-ref-c">'+contactAnchor(r1.email, emailIcon)+'</div>';
      if(r1.phone) rh += '<div class="cv-ref-c">'+contactAnchor(r1.phone, phoneIcon)+'</div>';
      rh += '</div>';
      if(r2) {
        rh += '<div>';
        rh += '<div class="cv-ref-name">'+bf(r2.name)+'</div>';
        rh += '<div class="cv-ref-role">'+nl2br(r2.role)+'</div>';
        if(r2.email) rh += '<div class="cv-ref-c">'+contactAnchor(r2.email, emailIcon)+'</div>';
        if(r2.phone) rh += '<div class="cv-ref-c">'+contactAnchor(r2.phone, phoneIcon)+'</div>';
        rh += '</div>';
      }
      rh += '</div>';
      blocks.push({ type:'item', section:'refs', itemIndex:i, html:rh });
    }
  }

  /* ── PAGINATION ALGORITHM ── */
  const pages = [[]];
  let pi = 0; // current page index

  for (let i = 0; i < blocks.length; i++) {
    const block = blocks[i];
    pages[pi].push(block);

    const height = measureBlocksHeight(pages[pi]);
    if (height > maxContentHeightPx && pages[pi].length > 1) {
      // Overflowed — remove the block from this page
      pages[pi].pop();

      // Widow protection: if a section-title was left alone at the bottom, move it too
      if (pages[pi].length > 0) {
        const lastBlock = pages[pi][pages[pi].length - 1];
        if (lastBlock.type === 'section-title') {
          pages[pi].pop();
          i--; // re-process the section-title on next iteration
        }
      }

      pi++;
      pages[pi] = [block];
    }
  }

  /* ── RENDER PAGES TO DOM ── */
  let finalHtml = '';
  const totalPages = pages.length;

  pages.forEach(function(pageBlocks, index) {
    const pageNum = index + 1;
    const pageContentHtml = assembleBlocksHtml(pageBlocks);

    finalHtml += '<div class="cv-page">';
    finalHtml += pageContentHtml;
    finalHtml += '<div class="cv-page-footer">';
    finalHtml += '<div class="cv-footer-line"></div>';
    finalHtml += '<div class="cv-footer-content">';
    finalHtml += '<span>' + bf(name) + ' — CV</span>';
    finalHtml += '<span>Page ' + pageNum + ' of ' + totalPages + '</span>';
    finalHtml += '</div></div>';
    finalHtml += '</div>';
  });

  document.getElementById('cv').innerHTML = finalHtml;
  document.getElementById('cv-sandbox').innerHTML = '';

  adjustScale();
  save();
}

function save(){
  try {
    D.name = document.getElementById('f-name').value;
    D.title = document.getElementById('f-title').value;
    D.phone = document.getElementById('f-phone').value;
    D.email = document.getElementById('f-email').value;
    D.location = document.getElementById('f-location').value;
    D.summary = document.getElementById('f-summary').value;
    D.skills = document.getElementById('f-skills').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    localStorage.setItem('cv_data', JSON.stringify(D));
  } catch(e) {
    console.error("Error saving data:", e);
  }
}

function resetTemplate(){
  if(confirm('Are you sure you want to discard all changes and reset to the default template?')){
    localStorage.removeItem('cv_data');
    location.reload();
  }
}

/* ══════════════════════════════════════════
   PRINT - direct browser print, keeps live anchors
══════════════════════════════════════════ */
function printCV(){
  var printNow = function(){ window.focus(); window.print(); };
  if(!sessionStorage.getItem('cv_pdf_link_tip')){
    sessionStorage.setItem('cv_pdf_link_tip', '1');
    alert('For clickable links, set Destination to "Save as PDF" in Chrome or Edge. Do not use "Microsoft Print to PDF" or other printer drivers. Enable Background graphics if styles look incomplete.');
  }
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(printNow).catch(printNow);
  } else {
    setTimeout(printNow, 300);
  }
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function init(){
  const saved = localStorage.getItem('cv_data');
  if(saved){
    try {
      const parsed = JSON.parse(saved);
      Object.assign(D, parsed);
    } catch(e) {
      console.error("Error loading data:", e);
    }
  }

  document.getElementById('f-name').value     = D.name || '';
  document.getElementById('f-title').value    = D.title;
  document.getElementById('f-phone').value    = D.phone;
  document.getElementById('f-email').value    = D.email;
  document.getElementById('f-location').value = D.location;
  document.getElementById('f-summary').value  = D.summary;
  document.getElementById('f-skills').value   = D.skills.join('\n');

  // Attach focus tracking for simple header fields
  ['f-name','f-title','f-phone','f-email','f-location','f-summary','f-skills'].forEach(function(id){
    var el = document.getElementById(id);
    el.addEventListener('focus', function(){ _el = this; });
    el.addEventListener('input', function(){ _s0=this.selectionStart; _s1=this.selectionEnd; render(); });
  });

  buildLinks();
  buildJobs();
  buildEdu();
  buildProj();
  buildCerts();
  buildRefs();
  render();
}

init();
</script>
